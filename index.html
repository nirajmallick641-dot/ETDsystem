<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Electricity Theft Detection System</title>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&amp;family=Rajdhani:wght@300;400;600;700&amp;family=Space+Grotesk:wght@400;600;700&amp;family=JetBrains+Mono:wght@400;600&amp;display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { height: 100%; }
    body { 
      height: 100%; 
      font-family: 'Rajdhani', 'Space Grotesk', sans-serif; 
      background: linear-gradient(135deg, #0a0e27 0%, #1a2655 50%, #0f1e3d 100%);
      color: #e0f0ff;
      overflow: hidden;
      letter-spacing: 0.3px;
    }
    
    #app {
      height: 100%;
      width: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
    }

    .sidebar {
      width: 280px;
      background: rgba(5, 10, 25, 0.95);
      border-right: 3px solid rgba(0, 240, 255, 0.3);
      padding: 25px 0;
      overflow-y: auto;
      animation: slideInLeft 1s cubic-bezier(0.13, 0.66, 0.73, 1.26) forwards;
      position: relative;
      z-index: 100;
      transform: translateX(-320px);
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 20px 20px;
      margin-bottom: 20px;
      border-bottom: 2px solid rgba(0, 240, 255, 0.2);
      animation: slideDown 0.8s cubic-bezier(0.13, 0.66, 0.73, 1.26) 0.3s forwards;
      transform: translateY(-30px);
      opacity: 0;
    }

    .sidebar-header h3 {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9em;
      letter-spacing: 1px;
      color: #00f0ff;
      text-transform: uppercase;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 12px;
      animation: fadeIn 0.9s cubic-bezier(0.13, 0.66, 0.73, 1.26) 0.5s forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .sidebar-item {
      padding: 14px 16px;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s cubic-bezier(0.13, 0.66, 0.73, 1.26);
      display: flex;
      align-items: center;
      gap: 12px;
      color: #b0c4ff;
      font-weight: 600;
      border-left: 4px solid transparent;
      position: relative;
      overflow: hidden;
      transform: translateX(0);
    }

    .sidebar-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 100%;
      background: rgba(0, 240, 255, 0.1);
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.13, 0.66, 0.73, 1.26);
      z-index: -1;
    }

    .sidebar-item:hover {
      color: #00f0ff;
      border-left-color: #00f0ff;
      transform: translateX(8px);
      background: rgba(0, 240, 255, 0.12);
    }

    .sidebar-item:hover::before {
      transform: translateX(0);
    }

    .sidebar-item.active {
      background: rgba(0, 240, 255, 0.15);
      color: #00f0ff;
      border-left-color: #00f0ff;
      box-shadow: inset 0 0 20px rgba(0, 240, 255, 0.1);
      transform: translateX(8px);
      animation: activePulse 0.6s cubic-bezier(0.13, 0.66, 0.73, 1.26);
    }

    @keyframes activePulse {
      0% { transform: translateX(0); opacity: 0.6; }
      100% { transform: translateX(8px); opacity: 1; }
    }

    .sidebar-icon {
      font-size: 1.3em;
      min-width: 24px;
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      animation: fadeInRight 1s cubic-bezier(0.13, 0.66, 0.73, 1.26) 0.6s forwards;
      transform: translateX(0);
      opacity: 0;
    }

    .container { max-width: 1600px; margin: 0 auto; padding: 20px; }
    h1 { font-family: 'Orbitron', sans-serif; font-weight: 900; letter-spacing: 2px; }
    h2 { font-family: 'Orbitron', sans-serif; font-weight: 700; }

    @keyframes slideInLeft { 
      from { 
        transform: translateX(-320px); 
        opacity: 0; 
      } 
      to { 
        transform: translateX(0); 
        opacity: 1; 
      } 
    }
    @keyframes fadeInRight { 
      from { 
        transform: translateX(40px); 
        opacity: 0; 
      } 
      to { 
        transform: translateX(0); 
        opacity: 1; 
      } 
    }
    @keyframes slideDown { 
      from { 
        transform: translateY(-30px); 
        opacity: 0; 
      } 
      to { 
        transform: translateY(0); 
        opacity: 1; 
      } 
    }
    @keyframes glow-pulse { 0%, 100% { text-shadow: 0 0 20px #00f0ff, 0 0 40px rgba(0, 240, 255, 0.6); } 50% { text-shadow: 0 0 30px #00f0ff, 0 0 60px rgba(0, 240, 255, 0.8); } }

    .btn {
      background: linear-gradient(135deg, #00f0ff 0%, #00d4e0 100%);
      color: #000;
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
      font-family: 'Rajdhani', sans-serif;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.9em;
    }

    .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0, 240, 255, 0.7); }
    .btn:active { transform: translateY(-1px); }
    .btn.danger { background: linear-gradient(135deg, #ff3366 0%, #ff1744 100%); color: white; box-shadow: 0 0 20px rgba(255, 51, 102, 0.4); }
    .btn.danger:hover { box-shadow: 0 8px 30px rgba(255, 51, 102, 0.7); }
    .btn.secondary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; box-shadow: 0 0 20px rgba(102, 126, 234, 0.4); }
    .btn.secondary:hover { box-shadow: 0 8px 30px rgba(102, 126, 234, 0.7); }

    .card { background: rgba(15, 30, 60, 0.7); border: 2px solid rgba(0, 240, 255, 0.35); border-radius: 10px; padding: 25px; margin: 15px 0; backdrop-filter: blur(15px); box-shadow: 0 8px 32px rgba(0, 240, 255, 0.1); transition: all 0.3s ease; }
    .card:hover { border-color: rgba(0, 240, 255, 0.65); box-shadow: 0 12px 40px rgba(0, 240, 255, 0.15); background: rgba(15, 30, 60, 0.85); }

    .input { width: 100%; padding: 12px 14px; background: rgba(10, 20, 45, 0.8); border: 2px solid rgba(0, 240, 255, 0.25); color: #e0f0ff; border-radius: 6px; margin: 10px 0; font-family: 'Rajdhani', 'Space Grotesk', sans-serif; font-size: 1em; transition: all 0.3s ease; }
    .input:focus { outline: none; border-color: #00f0ff; box-shadow: 0 0 25px rgba(0, 240, 255, 0.5); background: rgba(10, 20, 45, 0.95); }
    .input::placeholder { color: rgba(224, 240, 255, 0.5); }

    .auth-tabs { display: flex; gap: 15px; margin-bottom: 20px; }
    .auth-tab { padding: 12px 24px; background: rgba(0, 240, 255, 0.1); border: 2px solid rgba(0, 240, 255, 0.3); border-radius: 8px; cursor: pointer; color: #e0f0ff; transition: all 0.3s; font-weight: 700; font-size: 1em; flex: 1; text-align: center; }
    .auth-tab:hover { border-color: rgba(0, 240, 255, 0.6); background: rgba(0, 240, 255, 0.15); }
    .auth-tab.active { background: linear-gradient(135deg, #00f0ff 0%, #00d4e0 100%); color: #000; border-color: #00f0ff; }

    .form-group { margin-bottom: 15px; }
    .form-label { display: block; margin-bottom: 8px; font-weight: 600; opacity: 0.9; font-size: 0.95em; }

    .divider { display: flex; align-items: center; margin: 25px 0; gap: 15px; }
    .divider-line { flex: 1; height: 1px; background: rgba(0, 240, 255, 0.2); }
    .divider-text { opacity: 0.6; font-size: 0.9em; }

    .social-login { display: flex; gap: 12px; margin-bottom: 20px; }
    .social-btn { flex: 1; padding: 12px; border: 2px solid rgba(0, 240, 255, 0.2); background: rgba(0, 240, 255, 0.05); border-radius: 8px; color: #e0f0ff; cursor: pointer; font-weight: 600; transition: all 0.3s; font-size: 0.9em; }
    .social-btn:hover { border-color: rgba(0, 240, 255, 0.5); background: rgba(0, 240, 255, 0.1); }

    .password-strength { margin-top: 8px; height: 4px; background: rgba(0, 240, 255, 0.1); border-radius: 2px; overflow: hidden; }
    .strength-bar { height: 100%; width: 0%; transition: all 0.3s; }

    .error-message { color: #ff3366; font-size: 0.9em; margin-top: 5px; display: none; }
    .error-message.show { display: block; }

    .toast { position: fixed; top: 25px; right: 25px; padding: 15px 25px; background: rgba(255, 51, 102, 0.95); border: 2px solid #ff3366; border-radius: 8px; color: white; z-index: 9999; animation: slideIn 0.4s ease; font-weight: 700; box-shadow: 0 8px 32px rgba(255, 51, 102, 0.4); font-size: 0.9em; }
    @keyframes slideIn { from { transform: translateX(450px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .glow { text-shadow: 0 0 20px #00f0ff, 0 0 40px rgba(0, 240, 255, 0.6), 0 0 60px rgba(0, 240, 255, 0.3); color: #00f0ff; }

    table { width: 100%; border-collapse: collapse; margin: 15px 0; }
    th { padding: 15px; border-bottom: 2px solid rgba(0, 240, 255, 0.4); text-align: left; font-weight: 700; font-family: 'Orbitron', sans-serif; font-size: 0.9em; letter-spacing: 1px; text-transform: uppercase; opacity: 0.9; color: #00f0ff; }
    td { padding: 12px 15px; border-bottom: 1px solid rgba(0, 240, 255, 0.1); text-align: left; }
    tr:hover { background: rgba(0, 240, 255, 0.08); }

    .stat-box { background: rgba(0, 240, 255, 0.08); border: 2px solid rgba(0, 240, 255, 0.3); border-radius: 10px; padding: 20px; text-align: center; transition: all 0.3s ease; }
    .stat-box:hover { background: rgba(0, 240, 255, 0.12); border-color: rgba(0, 240, 255, 0.6); box-shadow: 0 8px 25px rgba(0, 240, 255, 0.2); transform: translateY(-5px); }
    .stat-number { font-size: 2.2em; font-family: 'Orbitron', sans-serif; font-weight: 900; margin: 10px 0; }
    .stat-label { font-size: 0.9em; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }
    .stat-sublabel { font-size: 0.8em; opacity: 0.55; margin-top: 5px; }

    .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
    .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; margin-bottom: 25px; }

    .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .nav-tab { padding: 10px 18px; background: rgba(0, 240, 255, 0.15); border: 2px solid rgba(0, 240, 255, 0.3); border-radius: 6px; cursor: pointer; color: #e0f0ff; transition: all 0.3s; font-weight: 600; }
    .nav-tab:hover { border-color: rgba(0, 240, 255, 0.6); background: rgba(0, 240, 255, 0.25); }
    .nav-tab.active { background: linear-gradient(135deg, #00f0ff 0%, #00d4e0 100%); color: #000; border-color: #00f0ff; }

    .status-badge { padding: 6px 12px; border-radius: 5px; font-size: 0.8em; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: inline-block; }
    .status-online { background: rgba(0, 255, 136, 0.18); color: #00ff88; border: 1px solid rgba(0, 255, 136, 0.3); }
    .status-warning { background: rgba(255, 170, 0, 0.18); color: #ffaa00; border: 1px solid rgba(255, 170, 0, 0.3); }
    .status-alert { background: rgba(255, 51, 102, 0.18); color: #ff3366; border: 1px solid rgba(255, 51, 102, 0.3); }

    .empty-state { padding: 40px 20px; text-align: center; opacity: 0.75; }
    .empty-state-icon { font-size: 3em; margin-bottom: 15px; }
    .empty-state-title { font-size: 1.2em; font-weight: 700; margin-bottom: 8px; }
    .empty-state-text { font-size: 0.9em; opacity: 0.6; }

    .login-container { max-width: 500px; margin: 60px auto; padding: 0 20px; }
    .header-section { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; gap: 20px; flex-wrap: wrap; }
    .header-left h1 { font-size: 2.2em; margin-bottom: 5px; }
    .header-left p { opacity: 0.65; font-size: 1em; }
    .header-right { text-align: right; }
    .header-right p { margin: 5px 0; font-size: 0.9em; }

    .btn-group { display: flex; gap: 12px; margin-top: 20px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
    .meter-id { font-family: 'Courier New', monospace; font-weight: 700; }

    .radar-container { width: 100%; height: 300px; background: rgba(10, 20, 45, 0.6); border-radius: 10px; border: 2px solid rgba(0, 240, 255, 0.3); position: relative; overflow: hidden; }
    .radar-svg { width: 100%; height: 100%; }

    .graph-container { width: 100%; height: 250px; background: rgba(10, 20, 45, 0.6); border-radius: 10px; border: 2px solid rgba(0, 240, 255, 0.3); position: relative; overflow: hidden; margin: 15px 0; }
    .graph-bar { position: absolute; bottom: 30px; background: linear-gradient(180deg, #00f0ff, #00d4e0); border-radius: 4px; transition: all 0.3s; }
    .graph-bar:hover { filter: brightness(1.3); }

    .power-flow { position: relative; height: 150px; background: rgba(0, 240, 255, 0.08); border: 2px solid rgba(0, 240, 255, 0.3); border-radius: 10px; padding: 20px; overflow: hidden; }
    .flow-item { position: absolute; color: #00f0ff; font-weight: 700; }

    .user-profile { background: rgba(0, 240, 255, 0.08); border: 2px solid rgba(0, 240, 255, 0.3); border-radius: 10px; padding: 20px; text-align: center; }
    .profile-avatar { width: 80px; height: 80px; background: linear-gradient(135deg, #00f0ff, #667eea); border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 2.5em; }

    .map-container { width: 100%; height: 300px; background: rgba(10, 20, 45, 0.6); border-radius: 10px; border: 2px solid rgba(0, 240, 255, 0.3); position: relative; overflow: hidden; }
    .map-point { position: absolute; width: 12px; height: 12px; background: radial-gradient(circle, #00ff88, transparent); border-radius: 50%; box-shadow: 0 0 15px rgba(0, 255, 136, 0.8); }
    .map-point.alert { background: radial-gradient(circle, #ff3366, transparent); box-shadow: 0 0 15px rgba(255, 51, 102, 0.8); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.7; } }

    .sensor-display { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
    .sensor-box { background: rgba(0, 240, 255, 0.08); border: 2px solid rgba(0, 240, 255, 0.3); border-radius: 8px; padding: 15px; text-align: center; }
    .sensor-value { font-size: 1.8em; color: #00f0ff; font-weight: 900; margin: 10px 0; }
    .sensor-label { font-size: 0.8em; opacity: 0.7; text-transform: uppercase; }

    .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
    .team-member { background: rgba(0, 240, 255, 0.08); border: 2px solid rgba(0, 240, 255, 0.3); border-radius: 8px; padding: 15px; text-align: center; }
    .team-member-name { font-weight: 700; margin-top: 10px; }

    @media (max-width: 768px) {
      .container { padding: 10px; }
      .header-section { margin-bottom: 15px; }
      .nav-tabs { flex-direction: column; }
      .nav-tab { width: 100%; }

      #app {
        flex-direction: column;
        position: relative;
      }

      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        height: 100%;
        width: 250px;
        z-index: 999;
        transform: translateX(-250px);
        background: rgba(5, 10, 25, 0.98);
        border-right: 3px solid rgba(0, 240, 255, 0.3);
        overflow-y: auto;
        transition: transform 0.3s cubic-bezier(0.13, 0.66, 0.73, 1.26);
        animation: none;
      }

      .sidebar.show {
        transform: translateX(0);
      }

      .main-content {
        width: 100%;
        flex: 1;
        position: relative;
        z-index: 1;
      }

      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 500;
        display: none;
      }

      .overlay.show {
        display: block;
      }
    }
  </style>
  <script src="https://cdn.tailwindcss.com/3.4.17" type="text/javascript"></script>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body>
  <div id="app"></div>
  <script>
    const defaultConfig = {
      system_title: 'Advanced Electricity Theft Detection System',
      college_name: 'PPI Institute of Technology'
    };

    let config = { ...defaultConfig };
    let isLoggedIn = false;
    let currentUser = null;
    let allRecords = [];
    let currentTab = 'overview';
    let soundEnabled = true;
    let radarActive = true;
    let sidebarOpen = false;

    const teamMembers = [
      { name: 'Niraj Mallick', role: 'Lead Developer' },
      { name: 'Adit Patel', role: 'System Architect' },
      { name: 'Moksh Bhatt', role: 'UI/UX Designer' },
      { name: 'Mahashivratri', role: 'Data Analyst' }
    ];

    const meters = [
      { id: 'MTR001', location: 'Block A', status: 'online', lat: 35.5, lng: 20.5 },
      { id: 'MTR002', location: 'Block B', status: 'online', lat: 38.2, lng: 45.3 },
      { id: 'MTR003', location: 'Block C', status: 'warning', lat: 42.8, lng: 35.7 },
      { id: 'MTR004', location: 'Block D', status: 'online', lat: 45.2, lng: 60.1 },
      { id: 'MTR005', location: 'Block E', status: 'alert', lat: 50.5, lng: 50.2 }
    ];

    function showToast(msg, type = 'alert') {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = msg;
      if (type === 'success') {
        toast.style.background = 'rgba(0, 255, 136, 0.95)';
        toast.style.borderColor = '#00ff88';
      }
      if (type === 'warning') {
        toast.style.background = 'rgba(255, 170, 0, 0.95)';
        toast.style.borderColor = '#ffaa00';
      }
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function renderRadar() {
      const svg = document.querySelector('.radar-svg');
      if (!svg) return;
      
      const size = 300;
      const center = size / 2;
      let radarSvg = `<svg viewBox="0 0 ${size} ${size}" class="radar-svg" style="width: 100%; height: 100%;">`;
      
      // Background circles
      for (let i = 1; i <= 3; i++) {
        const r = (size / 2) * (i / 3);
        radarSvg += `<circle cx="${center}" cy="${center}" r="${r}" fill="none" stroke="rgba(0, 240, 255, 0.2)" stroke-width="1"/>`;
      }
      
      // Active alerts as radar dots
      const alerts = allRecords.filter(r => !r.resolved);
      alerts.forEach((alert, idx) => {
        const angle = (idx * 360 / alerts.length) * Math.PI / 180;
        const distance = (size / 2) * 0.7;
        const x = center + distance * Math.cos(angle);
        const y = center + distance * Math.sin(angle);
        const isAlert = alert.severity === 'critical';
        radarSvg += `<circle cx="${x}" cy="${y}" r="8" fill="${isAlert ? '#ff3366' : '#ffaa00'}" opacity="0.8" style="filter: drop-shadow(0 0 10px ${isAlert ? 'rgba(255, 51, 102, 0.8)' : 'rgba(255, 170, 0, 0.8)'})"/>`;
      });
      
      radarSvg += `</svg>`;
      svg.outerHTML = radarSvg;
    }

    function renderGraph() {
      const container = document.getElementById('graph-container');
      if (!container) return;

      const readings = allRecords.slice(-10);
      if (readings.length === 0) {
        container.innerHTML = '<div class="empty-state" style="margin: 0;"><p>No data yet</p></div>';
        return;
      }

      const maxReading = Math.max(...readings.map(r => r.reading || 0), 100);
      let html = '';
      readings.forEach((r, idx) => {
        const height = (r.reading / maxReading) * 100;
        const color = r.severity === 'critical' ? '#ff3366' : r.severity === 'high' ? '#ffaa00' : '#00f0ff';
        html += `<div class="graph-bar" style="left: ${(idx / readings.length) * 100}%; width: ${(95 / readings.length)}%; height: ${height}%; background: linear-gradient(180deg, ${color}, rgba(0, 240, 255, 0.3));"></div>`;
      });
      container.innerHTML = html;
    }

    function renderMap() {
      const container = document.getElementById('map-container');
      if (!container) return;

      let html = '';
      meters.forEach(meter => {
        const alert = allRecords.find(r => r.meter_id === meter.id && !r.resolved);
        const x = (meter.lng / 100) * 100;
        const y = (meter.lat / 100) * 100;
        html += `<div class="map-point ${alert ? 'alert' : ''}" style="left: ${x}%; top: ${y}%; transform: translate(-50%, -50%);" title="${meter.id}: ${meter.location}"></div>`;
      });
      container.innerHTML = html;
    }

    function renderLoginPage() {
      const app = document.getElementById('app');
      let authMode = 'login';
      
      function updateAuthUI() {
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        const loginTab = document.getElementById('login-tab');
        const signupTab = document.getElementById('signup-tab');
        
        if (authMode === 'login') {
          loginForm.style.display = 'block';
          signupForm.style.display = 'none';
          loginTab.classList.add('active');
          signupTab.classList.remove('active');
        } else {
          loginForm.style.display = 'none';
          signupForm.style.display = 'block';
          loginTab.classList.remove('active');
          signupTab.classList.add('active');
        }
      }

      window.switchAuthMode = (mode) => {
        authMode = mode;
        updateAuthUI();
      };

      window.validatePassword = (pass) => {
        const strength = document.getElementById('strength-bar');
        if (!strength) return;
        let width = 0;
        if (pass.length > 0) width = 25;
        if (pass.length > 6) width = 50;
        if (pass.length > 8 && /[A-Z]/.test(pass) && /[0-9]/.test(pass)) width = 75;
        if (pass.length > 10 && /[A-Z]/.test(pass) && /[0-9]/.test(pass) && /[^A-Za-z0-9]/.test(pass)) width = 100;
        strength.style.background = width <= 25 ? '#ff3366' : width <= 50 ? '#ffaa00' : width <= 75 ? '#00f0ff' : '#00ff88';
        strength.style.width = width + '%';
      };

        const name = document.getElementById('signup-name').value;
        const email = document.getElementById('signup-email').value;
        const pass = document.getElementById('signup-pass').value;
        const confirmPass = document.getElementById('signup-confirm-pass').value;
        const terms = document.getElementById('terms-checkbox').checked;

        const nameError = document.getElementById('name-error');
        const emailError = document.getElementById('email-error');
        const passError = document.getElementById('pass-error');
        const termsError = document.getElementById('terms-error');

        nameError.classList.remove('show');
        emailError.classList.remove('show');
        passError.classList.remove('show');
        termsError.classList.remove('show');

        let isValid = true;

        if (name.length < 3) {
          nameError.textContent = '❌ Name must be at least 3 characters';
          nameError.classList.add('show');
          isValid = false;
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
          emailError.textContent = '❌ Invalid email address';
          emailError.classList.add('show');
          isValid = false;
        }

        if (pass.length < 6) {
          passError.textContent = '❌ Password must be at least 6 characters';
          passError.classList.add('show');
          isValid = false;
        }

        if (pass !== confirmPass) {

          passError.classList.add('show');
          isValid = false;
        }

        if (!terms) {
          termsError.textContent = '❌ Accept terms to continue';
          termsError.classList.add('show');
          isValid = false;
        }

        return isValid;
      };

    function renderApp() {

      if (!isLoggedIn) {

    function doLogin() {
      const email = document.getElementById('login-email').value;
      const pass = document.getElementById('login-pass').value;

      if (!email || !pass) {
        showToast('⚠️ Please fill all fields', 'warning');
        return;
      }

      currentUser = { name: email.split('@')[0].charAt(0).toUpperCase() + email.split('@')[0].slice(1), email };
      isLoggedIn = true;
      currentTab = 'overview';
      showToast('✅ Login Successful! Welcome!', 'success');
      renderApp();
    }

    function doLogout() {
      isLoggedIn = false;
      currentUser = null;
      currentTab = 'overview';
      showToast('👋 Logged Out Successfully', 'success');
      renderApp();
    }

    async function addTestAlert() {
      if (allRecords.length >= 999) {
        showToast('⚠️ Data limit reached', 'warning');
        return;
      }

      const meter = meters[Math.floor(Math.random() * meters.length)];
      const alert = {
        meter_id: meter.id,
        location: meter.location,
        reading: Math.round(Math.random() * 500 + 50),
        status: ['Voltage Anomaly', 'Current Mismatch', 'Bypass Detected', 'Phase Shift'][Math.floor(Math.random() * 4)],
        severity: ['low', 'medium', 'high', 'critical'][Math.floor(Math.random() * 4)],
        timestamp: new Date().toISOString(),
        resolved: false,
        lat: meter.lat,
        lng: meter.lng
      };

      const result = await window.dataSdk.create(alert);
      if (result.isOk) {
        showToast('🚨 Alert Generated & Stored!', 'alert');
        if (soundEnabled) {
          showToast('🔊 Alert Sound Would Play Here', 'alert');
        }
        renderRadar();
        renderMap();
      } else {
        showToast('❌ Error Creating Alert', 'warning');
      }
    }

    async function resolveAlert(id) {
      const alert = allRecords.find(r => r.__backendId === id);
      if (alert) {
        const result = await window.dataSdk.update({ ...alert, resolved: true });
        if (result.isOk) {
          showToast('✅ Alert Resolved Successfully!', 'success');
        } else {
          showToast('❌ Error Resolving Alert', 'warning');
        }
      }
    }

    const dataHandler = {
      onDataChanged(data) {
        allRecords = data;
        if (isLoggedIn && currentTab === 'detection') {
          renderRadar();
          renderMap();
        }
        if (isLoggedIn && currentTab === 'analytics') {
          renderGraph();
        }
        if (isLoggedIn) renderApp();
      }
    };

    async function initSDK() {
      try {
        const result = await window.dataSdk.init(dataHandler);
        if (result.isError) console.error('Data SDK init failed');
      } catch (err) {
        console.error('Data SDK error:', err);
      }

      if (window.elementSdk) {
        try {
          window.elementSdk.init({
            defaultConfig,
            onConfigChange: async (newConfig) => {
              config = { ...defaultConfig, ...newConfig };
              renderApp();
            },
            mapToCapabilities: () => ({
              recolorables: [],
              borderables: [],
              fontEditable: undefined,
              fontSizeable: undefined
            }),
            mapToEditPanelValues: (cfg) => new Map([
              ['system_title', cfg.system_title || defaultConfig.system_title],
              ['college_name', cfg.college_name || defaultConfig.college_name]
            ])
          });
        } catch (err) {
          console.error('Element SDK error:', err);
        }
      }

      renderApp();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initSDK);
    } else {
      initSDK();
    }
  </script>
