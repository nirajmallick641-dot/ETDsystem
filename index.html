 <head>
  <meta charset="UTF-8">

  <script src="/_sdk/data_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&amp;family=Rajdhani:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }
    
    :root {
      --primary: #00f0ff;
      --secondary: #0a1628;
      --accent: #ff3366;
      --success: #00ff88;
      --warning: #ffaa00;
      --surface: #0d2137;
    }
    
    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--secondary);
      color: #e0f0ff;
      overflow-x: hidden;
    }
    
    .font-orbitron { font-family: 'Orbitron', monospace; }
    
    /* Animated Background */
    .cyber-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }
    
    .cyber-bg::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(ellipse at 20% 80%, rgba(0, 240, 255, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(255, 51, 102, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(0, 255, 136, 0.08) 0%, transparent 70%);
      animation: bgPulse 8s ease-in-out infinite;
    }
    
    .grid-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 20s linear infinite;
    }
    
    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
    }
    
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--primary);
      border-radius: 50%;
      animation: particleFloat 15s infinite;
      opacity: 0.6;
    }
    
    @keyframes bgPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    
    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }
    
    @keyframes particleFloat {
      0%, 100% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      50% { transform: translateY(-10vh) scale(1); }
    }
    
    /* Glowing Effects */
    .glow-text {
      text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary), 0 0 40px var(--primary);
    }
    
    .glow-box {
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.3), inset 0 0 20px rgba(0, 240, 255, 0.1);
    }
    
    .glow-border {
      border: 1px solid var(--primary);
      box-shadow: 0 0 10px rgba(0, 240, 255, 0.5), inset 0 0 10px rgba(0, 240, 255, 0.1);
    }
    
    /* Button Animations */
    .cyber-btn {
      position: relative;
      background: linear-gradient(135deg, var(--surface) 0%, #1a3a5c 100%);
      border: 1px solid var(--primary);
      color: var(--primary);
      padding: 12px 24px;
      font-family: 'Orbitron', monospace;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    
    .cyber-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.4), transparent);
      transition: left 0.5s ease;
    }
    
    .cyber-btn:hover::before {
      left: 100%;
    }
    
    .cyber-btn:hover {
      background: linear-gradient(135deg, #1a3a5c 0%, #2a5a8c 100%);
      box-shadow: 0 0 30px rgba(0, 240, 255, 0.5), 0 0 60px rgba(0, 240, 255, 0.3);
      transform: translateY(-2px);
    }
    
    .cyber-btn:active {
      transform: translateY(0);
    }
    
    /* Card Styles */
    .cyber-card {
      background: linear-gradient(135deg, rgba(13, 33, 55, 0.9) 0%, rgba(26, 58, 92, 0.9) 100%);
      border: 1px solid rgba(0, 240, 255, 0.3);
      border-radius: 8px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }
    
    .cyber-card:hover {
      border-color: var(--primary);
      box-shadow: 0 0 30px rgba(0, 240, 255, 0.2);
      transform: translateY(-5px);
    }
    
    /* Input Styles */
    .cyber-input {
      background: rgba(10, 22, 40, 0.8);
      border: 1px solid rgba(0, 240, 255, 0.3);
      color: #e0f0ff;
      padding: 12px 16px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      transition: all 0.3s ease;
      width: 100%;
    }
    
    .cyber-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
    }
    
    .cyber-input::placeholder {
      color: rgba(224, 240, 255, 0.5);
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: var(--secondary);
    }
    
    ::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #00d4e0;
    }
    
    /* Loading Animation */
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(0, 240, 255, 0.3);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Pulse Animation */
    .pulse {
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* Alert Flash */
    .alert-flash {
      animation: alertFlash 0.5s ease-in-out infinite;
    }
    
    @keyframes alertFlash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    
    /* Slide In Animation */
    .slide-in {
      animation: slideIn 0.5s ease-out forwards;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    /* Fade In Animation */
    .fade-in {
      animation: fadeIn 0.5s ease-out forwards;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    /* Scale In Animation */
    .scale-in {
      animation: scaleIn 0.3s ease-out forwards;
    }
    
    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    
    /* Data Flow Animation */
    .data-flow {
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      background-size: 200% 100%;
      animation: dataFlow 2s linear infinite;
    }
    
    @keyframes dataFlow {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    
    /* Radar Animation */
    .radar-sweep {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      transform-origin: center center;
      background: conic-gradient(from 0deg, transparent 0deg, rgba(0, 240, 255, 0.4) 30deg, transparent 60deg);
      animation: radarSweep 4s linear infinite;
    }
    
    @keyframes radarSweep {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }
    
    .radar-ring {
      position: absolute;
      border: 1px solid rgba(0, 240, 255, 0.3);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    
    .radar-dot {
      position: absolute;
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
      animation: radarDotPulse 1s ease-in-out infinite;
    }
    
    @keyframes radarDotPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.5); }
    }
    
    /* Status Indicators */
    .status-online {
      background: var(--success);
      box-shadow: 0 0 10px var(--success);
    }
    
    .status-warning {
      background: var(--warning);
      box-shadow: 0 0 10px var(--warning);
    }
    
    .status-alert {
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
    }
    
    /* Navigation */
    .nav-item {
      position: relative;
      padding: 12px 20px;
      color: rgba(224, 240, 255, 0.7);
      cursor: pointer;
      transition: all 0.3s ease;
      border-left: 3px solid transparent;
    }
    
    .nav-item:hover {
      color: var(--primary);
      background: rgba(0, 240, 255, 0.1);
    }
    
    .nav-item.active {
      color: var(--primary);
      background: rgba(0, 240, 255, 0.15);
      border-left-color: var(--primary);
    }
    
    .nav-item.active::after {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--primary);
      box-shadow: 0 0 10px var(--primary);
    }
    
    /* Chart Styles */
    .chart-bar {
      background: linear-gradient(180deg, var(--primary) 0%, rgba(0, 240, 255, 0.3) 100%);
      transition: height 0.5s ease;
    }
    
    .chart-line {
      stroke: var(--primary);
      stroke-width: 2;
      fill: none;
      filter: drop-shadow(0 0 5px var(--primary));
    }
    
    /* Map Styles */
    .map-container {
      background: linear-gradient(135deg, #0a1628 0%, #1a3a5c 100%);
      border: 1px solid rgba(0, 240, 255, 0.3);
      position: relative;
      overflow: hidden;
    }
    
    .map-marker {
      position: absolute;
      width: 20px;
      height: 20px;
      transform: translate(-50%, -50%);
      cursor: pointer;
    }
    
    .map-marker::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: var(--accent);
      border-radius: 50%;
      animation: markerPulse 2s ease-in-out infinite;
    }
    
    .map-marker::after {
      content: '';
      position: absolute;
      width: 40px;
      height: 40px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border: 2px solid var(--accent);
      border-radius: 50%;
      animation: markerRing 2s ease-out infinite;
    }
    
    @keyframes markerPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.8; }
    }
    
    @keyframes markerRing {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
    }
    
    /* Toast Notifications */
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 16px 24px;
      background: linear-gradient(135deg, rgba(255, 51, 102, 0.9) 0%, rgba(255, 51, 102, 0.7) 100%);
      border: 1px solid var(--accent);
      border-radius: 8px;
      color: white;
      font-family: 'Orbitron', monospace;
      z-index: 10000;
      animation: toastSlide 0.5s ease-out;
      box-shadow: 0 0 30px rgba(255, 51, 102, 0.5);
    }
    
    @keyframes toastSlide {
      from {
        opacity: 0;
        transform: translateX(100px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    /* Gauge */
    .gauge-container {
      position: relative;
      width: 150px;
      height: 75px;
      overflow: hidden;
    }
    
    .gauge-bg {
      position: absolute;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: conic-gradient(from 180deg, #ff3366 0deg, #ffaa00 90deg, #00ff88 180deg);
      clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%);
    }
    
    .gauge-cover {
      position: absolute;
      width: 120px;
      height: 120px;
      background: var(--surface);
      border-radius: 50%;
      top: 15px;
      left: 15px;
    }
    
    .gauge-needle {
      position: absolute;
      width: 4px;
      height: 60px;
      background: var(--primary);
      bottom: 0;
      left: 50%;
      transform-origin: bottom center;
      transform: translateX(-50%) rotate(-90deg);
      transition: transform 1s ease;
      box-shadow: 0 0 10px var(--primary);
    }
    
    /* Desktop Sidebar */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 280px;
      height: 100%;
      z-index: 50;
      transition: none;
    }
    
    .main-content {
      margin-left: 280px;
      width: calc(100% - 280px);
      transition: none;
    }
    
    .sidebar-overlay {
      display: none;
    }
    
    /* Responsive - Mobile */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        width: 280px;
        height: 100%;
        z-index: 1000;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
      }
      
      .sidebar.open {
        transform: translateX(0);
      }
      
      .main-content {
        margin-left: 0;
        width: 100%;
      }
      
      .mobile-menu-btn {
        display: block !important;
      }
      
      .sidebar-overlay {
        display: block;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 40;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }
      
      .sidebar-overlay.active {
        opacity: 1;
        pointer-events: auto;
      }
    }
    
    /* Hide mobile menu button by default */
    .mobile-menu-btn {
      display: none;
    }
  </style>

  <script>
    // =============================================
    // CONFIGURATION & STATE
    // =============================================
    const defaultConfig = {
      system_title: 'Electricity Theft Detection System',
      college_name: 'PPI Institute of Technology',
      primary_color: '#00f0ff',
      secondary_color: '#0a1628',
      accent_color: '#ff3366',
      text_color: '#e0f0ff',
      surface_color: '#0d2137'
    };
    
    let config = { ...defaultConfig };
    let currentPage = 'login';
    let isLoggedIn = false;
    let currentUser = null;
    let allRecords = [];
    let alertSound = null;
    let sidebarOpen = false;
    let hardwareEnabled = false;
    let hardwareData = {
      MTR001: { voltage: 220, current: 15, power: 3300, factor: 0.98 },
      MTR002: { voltage: 218, current: 12, power: 2616, factor: 0.99 },
      MTR003: { voltage: 222, current: 18, power: 3996, factor: 0.97 },
      MTR004: { voltage: 219, current: 16, power: 3504, factor: 0.98 },
      MTR005: { voltage: 221, current: 20, power: 4420, factor: 0.96 }
    };
    
    // Team Members
    const teamMembers = [
      { name: 'Niraj Mallick', role: 'Team Lead', avatar: '👨‍💻' },
      { name: 'Adit Patel', role: 'Developer', avatar: '👨‍🔬' },
      { name: 'Moksh Bahtt', role: 'Analyst', avatar: '👨‍🎓' },
      { name: 'Mahashivratri', role: 'Designer', avatar: '👨‍🎨' }
    ];
    
    // Simulated Meters Data
    const metersData = [
      { id: 'MTR-001', location: 'Block A', lat: 23.0225, lng: 72.5714, status: 'online' },
      { id: 'MTR-002', location: 'Block B', lat: 23.0235, lng: 72.5724, status: 'online' },
      { id: 'MTR-003', location: 'Block C', lat: 23.0215, lng: 72.5704, status: 'warning' },
      { id: 'MTR-004', location: 'Block D', lat: 23.0245, lng: 72.5734, status: 'online' },
      { id: 'MTR-005', location: 'Block E', lat: 23.0205, lng: 72.5694, status: 'alert' }
    ];
    
    // =============================================
    // UTILITY FUNCTIONS
    // =============================================
    function generateId() {
      return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    }
    
    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleString();
    }
    
    function showToast(message, type = 'alert') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.style.background = type === 'success' 
        ? 'linear-gradient(135deg, rgba(0, 255, 136, 0.9) 0%, rgba(0, 255, 136, 0.7) 100%)'
        : type === 'warning'
        ? 'linear-gradient(135deg, rgba(255, 170, 0, 0.9) 0%, rgba(255, 170, 0, 0.7) 100%)'
        : 'linear-gradient(135deg, rgba(255, 51, 102, 0.9) 0%, rgba(255, 51, 102, 0.7) 100%)';
      toast.innerHTML = `
        <div class="flex items-center gap-3">
          <span class="text-2xl">${type === 'success' ? '✅' : type === 'warning' ? '⚠️' : '🚨'}</span>
          <span>${message}</span>
        </div>
      `;
      container.appendChild(toast);
      
      // Play alert sound for alerts
      if (type === 'alert' && alertSound) {
        alertSound.currentTime = 0;
        alertSound.play().catch(() => {});
      }
      
      setTimeout(() => toast.remove(), 5000);
    }
    
    function createParticles() {
      const container = document.getElementById('particles');
      if (!container) return;
      container.innerHTML = '';
      for (let i = 0; i < 30; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 15 + 's';
        particle.style.animationDuration = (10 + Math.random() * 10) + 's';
        container.appendChild(particle);
      }
    }
    
    // =============================================
    // DATA SIMULATION
    // =============================================
    let simulationInterval = null;
    
    function startSimulation() {
      if (simulationInterval) return;
      
      simulationInterval = setInterval(async () => {
        if (!isLoggedIn) return;
        
        // Random chance of generating an alert
        if (Math.random() < 0.15) {
          const meter = metersData[Math.floor(Math.random() * metersData.length)];
          const alertTypes = ['Voltage Anomaly', 'Current Mismatch', 'Bypass Detected', 'Tampering Alert', 'Meter Manipulation'];
          const severities = ['low', 'medium', 'high', 'critical'];
          
          const newAlert = {
            type: 'alert',
            meter_id: meter.id,
            location: meter.location,
            lat: meter.lat + (Math.random() - 0.5) * 0.01,
            lng: meter.lng + (Math.random() - 0.5) * 0.01,
            reading: Math.round(Math.random() * 500 + 100),
            sensor1: Math.round(Math.random() * 100),
            sensor2: Math.round(Math.random() * 100),
            status: alertTypes[Math.floor(Math.random() * alertTypes.length)],
            severity: severities[Math.floor(Math.random() * severities.length)],
            timestamp: new Date().toISOString(),
            resolved: false
          };
          
          if (allRecords.length < 999) {
            const result = await window.dataSdk.create(newAlert);
            if (result.isOk) {
              showToast(`⚡ ${newAlert.status} detected at ${newAlert.location}!`, 'alert');
            }
          }
        }
      }, 8000);
    }

    async function generateTestAlert() {
      if (allRecords.length >= 999) {
        showToast('Maximum data limit reached. Please delete some records.', 'warning');
        return;
      }
      
      const meter = metersData[Math.floor(Math.random() * metersData.length)];
      const alertTypes = ['Voltage Anomaly', 'Current Mismatch', 'Bypass Detected', 'Tampering Alert'];
      const severities = ['low', 'medium', 'high', 'critical'];
      
      const newAlert = {
        type: 'alert',
        meter_id: meter.id,
        location: meter.location,
        lat: meter.lat,
        lng: meter.lng,
        reading: Math.round(Math.random() * 500 + 100),
        sensor1: Math.round(Math.random() * 100),
        sensor2: Math.round(Math.random() * 100),
        status: alertTypes[Math.floor(Math.random() * alertTypes.length)],
        severity: severities[Math.floor(Math.random() * severities.length)],
        timestamp: new Date().toISOString(),
        resolved: false
      };
      
      const result = await window.dataSdk.create(newAlert);
      if (result.isOk) {
        showToast(`🚨 ${newAlert.status} detected at ${newAlert.location}!`, 'alert');
      } else {
        showToast('Failed to create alert', 'warning');
      }
    }
    
    async function resolveAlert(backendId) {
      const alert = allRecords.find(r => r.__backendId === backendId);
      if (alert) {
        const result = await window.dataSdk.update({ ...alert, resolved: true });
        if (result.isOk) {
          showToast('Alert resolved!', 'success');
        }
      }
    }
    
    async function deleteAlert(backendId) {
      const alert = allRecords.find(r => r.__backendId === backendId);
      if (alert) {
        const result = await window.dataSdk.delete(alert);
        if (result.isOk) {
          showToast('Alert deleted', 'success');
        }
      }
    }
    
    async function addTestMeterReading() {
      if (allRecords.length >= 999) {
        showToast('Maximum data limit reached', 'warning');
        return;
      }
      
      const meter = metersData[Math.floor(Math.random() * metersData.length)];
      const reading = {
        type: 'reading',
        meter_id: meter.id,
        location: meter.location,
        lat: meter.lat,
        lng: meter.lng,
        reading: Math.round(Math.random() * 500 + 100),
        sensor1: Math.round(Math.random() * 50 + 200),
        sensor2: Math.round(Math.random() * 30 + 10),
        status: 'normal',
        severity: 'low',
        timestamp: new Date().toISOString(),
        resolved: true
      };
      
      const result = await window.dataSdk.create(reading);
      if (result.isOk) {
        showToast('Reading recorded!', 'success');
      }
    }
    
    function handleContactSubmit(e) {
      e.preventDefault();
      showToast('Message sent successfully!', 'success');
      document.getElementById('contact-name').value = '';
      document.getElementById('contact-email').value = '';
      document.getElementById('contact-subject').value = '';
      document.getElementById('contact-message').value = '';
    }
    
    // =============================================
    // RENDER & ANIMATION
    // =============================================
    
    function renderApp() {
      const app = document.getElementById('app');
      
      if (!isLoggedIn || currentPage === 'login') {
        app.innerHTML = renderLoginPage();
      } else {
        switch (currentPage) {
          case 'overview':
            app.innerHTML = renderOverviewDashboard();
            break;
          case 'analytics':
            app.innerHTML = renderAnalyticsDashboard();
            break;
          case 'meters':
            app.innerHTML = renderMetersDashboard();
            break;
          case 'alerts':
            app.innerHTML = renderAlertsDashboard();
            break;
          case 'detection':
            app.innerHTML = renderDetectionDashboard();
            break;
          case 'profile':
            app.innerHTML = renderProfilePage();
            break;
          case 'contact':
            app.innerHTML = renderContactPage();
            break;
          default:
            app.innerHTML = renderOverviewDashboard();
        }
      }
      
      updateCharts();
    }
    
    function updateCharts() {
      // Update power flow chart
      const powerLine = document.getElementById('power-line');
      const powerArea = document.getElementById('power-area');
      if (powerLine && powerArea) {
        const points = [];
        const areaPoints = [];
        for (let i = 0; i <= 20; i++) {
          const x = i * 20;
          const y = 90 + Math.sin(i * 0.5 + Date.now() / 1000) * 40 + Math.random() * 20;
          points.push(`${x},${y}`);
          areaPoints.push(`${x},${y}`);
        }
        powerLine.setAttribute('d', 'M' + points.join(' L'));
        powerArea.setAttribute('d', 'M0,180 L' + areaPoints.join(' L') + ' L400,180 Z');
      }
      
      // Update alert graph
      const alertLine = document.getElementById('alert-line');
      const alertArea = document.getElementById('alert-area');
      if (alertLine && alertArea) {
        const points = [];
        for (let i = 0; i <= 25; i++) {
          const x = i * 20;
          const y = 90 + Math.sin(i * 0.3 + Date.now() / 800) * 50 + Math.random() * 30;
          points.push(`${x},${y}`);
        }
        alertLine.setAttribute('d', 'M' + points.join(' L'));
        alertArea.setAttribute('d', 'M0,180 L' + points.join(' L') + ' L500,180 Z');
      }
      
      // Update gauges
      const gauge1 = document.getElementById('gauge-sensor1');
      const gauge2 = document.getElementById('gauge-sensor2');
      if (gauge1) {
        const angle = -90 + Math.random() * 180;
        gauge1.style.transform = `translateX(-50%) rotate(${angle}deg)`;
      }
      if (gauge2) {
        const angle = -90 + Math.random() * 180;
        gauge2.style.transform = `translateX(-50%) rotate(${angle}deg)`;
      }
      
      // Update sensor values
      const sensor1 = document.getElementById('sensor1-value');
      const sensor2 = document.getElementById('sensor2-value');
      if (sensor1) sensor1.textContent = Math.round(210 + Math.random() * 20) + 'V';
      if (sensor2) sensor2.textContent = Math.round(10 + Math.random() * 20) + 'A';
    }
    
    // Update charts periodically
    setInterval(updateCharts, 2000);
    
    // =============================================
    // SDK INITIALIZATION
    // =============================================
    
    // Real-time radar animation loop
    let radarAnimationId = null;
    let googleMap = null;
    let mapMarkers = [];
    
    const dataHandler = {
      onDataChanged(data) {
        allRecords = data;
        if (isLoggedIn && currentPage !== 'login') {
          // Update radar with live data
          if (currentPage === 'detection') {
            updateLiveRadar(data);
            if (googleMap) updateGoogleMap(data);
          }
          renderApp();
        }
      }
    };
    
    // Update radar with live alert positions
    function updateLiveRadar(alerts) {
      const radarContainer = document.getElementById('detection-radar-container');
      if (!radarContainer) return;
      
      // Remove old dots
      const oldDots = radarContainer.querySelectorAll('.live-radar-dot');
      oldDots.forEach(dot => dot.remove());
      
      // Add active alert dots
      const activeAlerts = alerts.filter(a => a.type === 'alert' && !a.resolved);
      activeAlerts.forEach((alert, i) => {
        const dot = document.createElement('div');
        dot.className = 'radar-dot live-radar-dot';
        
        // Calculate position based on lat/lng relative to center
        const centerLat = 23.0225;
        const centerLng = 72.5714;
        const latDiff = alert.lat - centerLat;
        const lngDiff = alert.lng - centerLng;
        
        // Scale to radar range (0-45 pixels from center)
        const angle = Math.atan2(latDiff, lngDiff) * (180 / Math.PI);
        const distance = Math.sqrt(latDiff * latDiff + lngDiff * lngDiff) * 2000; // Scale factor
        const maxDistance = 45;
        const scaledDistance = Math.min(distance, maxDistance);
        
        const x = 50 + (scaledDistance / 45) * 40 * Math.cos(angle * Math.PI / 180);
        const y = 50 + (scaledDistance / 45) * 40 * Math.sin(angle * Math.PI / 180);
        
        dot.style.top = y + '%';
        dot.style.left = x + '%';
        dot.style.background = alert.severity === 'critical' ? '#ff3366' : 
                               alert.severity === 'high' ? '#ff6633' : 
                               alert.severity === 'medium' ? '#ffaa00' : '#00ff88';
        dot.title = `${alert.location} - ${alert.status}`;
        
        radarContainer.appendChild(dot);
      });
    }
    
    // Initialize Google Map
    function initGoogleMap(apiKey) {
      if (!apiKey || apiKey.trim() === '') return;
      
      // Load Google Maps API
      const script = document.createElement('script');
      script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&callback=initMapAfterLoad`;
      script.async = true;
      script.defer = true;
      
      window.initMapAfterLoad = function() {
        const mapContainer = document.getElementById('google-map-container');
        if (!mapContainer) return;
        
        googleMap = new google.maps.Map(mapContainer, {
          zoom: 15,
          center: { lat: 23.0225, lng: 72.5714 },
          mapTypeControl: false,
          fullscreenControl: false,
          styles: [
            { elementType: 'geometry', stylers: [{ color: '#0a1628' }] },
            { elementType: 'labels.text.stroke', stylers: [{ color: '#0a1628' }] },
            { elementType: 'labels.text.fill', stylers: [{ color: '#e0f0ff' }] },
            { featureType: 'administrative', elementType: 'geometry', stylers: [{ color: '#0d2137' }] },
            { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#1a3a5c' }] },
            { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#0d2137' }] }
          ]
        });
        
        updateGoogleMap(allRecords);
      };
      
      document.head.appendChild(script);
    }
    
    // Update Google Map with alert markers
    function updateGoogleMap(alerts) {
      if (!googleMap) return;
      
      // Clear old markers
      mapMarkers.forEach(marker => marker.setMap(null));
      mapMarkers = [];
      
      // Add active alert markers
      const activeAlerts = alerts.filter(a => a.type === 'alert' && !a.resolved);
      
      activeAlerts.forEach(alert => {
        const marker = new google.maps.Marker({
          position: { lat: alert.lat, lng: alert.lng },
          map: googleMap,
          title: alert.location,
          icon: {
            path: google.maps.SymbolPath.CIRCLE,
            scale: 8,
            fillColor: alert.severity === 'critical' ? '#ff3366' : 
                       alert.severity === 'high' ? '#ff6633' : 
                       alert.severity === 'medium' ? '#ffaa00' : '#00ff88',
            fillOpacity: 0.8,
            strokeColor: '#ffffff',
            strokeWeight: 2
          }
        });
        
        const infoWindow = new google.maps.InfoWindow({
          content: `
            <div style="color: #0a1628; padding: 8px;">
              <strong>${alert.location}</strong><br/>
              ${alert.status}<br/>
              <small>Severity: ${alert.severity}</small>
            </div>
          `
        });
        
        marker.addListener('click', () => {
          infoWindow.open(googleMap, marker);
        });
        
        mapMarkers.push(marker);
      });
    }
    
    async function initApp() {
      // Initialize Data SDK
      const dataResult = await window.dataSdk.init(dataHandler);
      if (!dataResult.isOk) {
        console.error('Failed to initialize Data SDK');
      }
      
      // Initialize Element SDK
      if (window.elementSdk) {
        window.elementSdk.init({
          defaultConfig,
          onConfigChange: async (newConfig) => {
            config = { ...defaultConfig, ...newConfig };
            
            // Check if hardware is enabled
            if (newConfig.enable_hardware !== undefined) {
              hardwareEnabled = newConfig.enable_hardware === 'true' || newConfig.enable_hardware === true;
            }
            
            // Update title elements
            const loginTitle = document.getElementById('login-title');
            if (loginTitle) loginTitle.textContent = config.system_title;
            
            const loginCollege = document.getElementById('login-college');
            if (loginCollege) loginCollege.textContent = config.college_name;
            
            const contactCollege = document.getElementById('contact-college');
            if (contactCollege) contactCollege.textContent = config.college_name;
            
            const contactTitle = document.getElementById('contact-title');
            if (contactTitle) contactTitle.textContent = config.system_title;
          },
          mapToCapabilities: (cfg) => ({
            recolorables: [
              {
                get: () => cfg.primary_color || defaultConfig.primary_color,
                set: (v) => { cfg.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); }
              },
              {
                get: () => cfg.secondary_color || defaultConfig.secondary_color,
                set: (v) => { cfg.secondary_color = v; window.elementSdk.setConfig({ secondary_color: v }); }
              },
              {
                get: () => cfg.accent_color || defaultConfig.accent_color,
                set: (v) => { cfg.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); }
              },
              {
                get: () => cfg.text_color || defaultConfig.text_color,
                set: (v) => { cfg.text_color = v; window.elementSdk.setConfig({ text_color: v }); }
              },
              {
                get: () => cfg.surface_color || defaultConfig.surface_color,
                set: (v) => { cfg.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); }
              }
            ],
            borderables: [],
            fontEditable: undefined,
            fontSizeable: undefined
          }),
          mapToEditPanelValues: (cfg) => new Map([
            ['system_title', cfg.system_title || defaultConfig.system_title],
            ['college_name', cfg.college_name || defaultConfig.college_name],
            ['map_api_key', cfg.map_api_key || ''],
            ['enable_hardware', cfg.enable_hardware ? 'true' : 'false']
          ])
        });
      }
      
      // Create particles
      createParticles();
      
      // Initial render
      renderApp();
    }
    
    initApp();
  </script>
